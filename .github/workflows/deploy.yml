name: Deploy to GitHub Pages

# Publishes the site whenever you push to main.
# After the first push, go to Settings -> Pages -> Build and deployment
# -> Source: "GitHub Actions" (only needed once).

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # the whole repo is the site (static files only)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
